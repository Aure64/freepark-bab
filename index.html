<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Le stationnement gratuit à Biarritz, Anglet et Bayonne, selon l'heure où vous y allez."
    />
    <meta name="theme-color" content="#faf9f5" />
    <!-- Aperçus de lien (WhatsApp, iMessage, réseaux sociaux) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="FreePark BAB — stationnement gratuit à Biarritz, Anglet, Bayonne" />
    <meta property="og:description" content="Entrez une adresse : l'app montre où vous garer gratuitement selon l'heure, et le temps de marche. Gratuit, sans compte, open data." />
    <meta property="og:url" content="https://freepark-bab.vercel.app/" />
    <meta property="og:image" content="https://freepark-bab.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_FR" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FreePark BAB" />
    <!-- Préconnexions : la carte et le géocodage démarrent sans attendre le JS -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="dns-prefetch" href="https://api-adresse.data.gouv.fr" />
    <!-- Les données partent en téléchargement dès le HTML (consommées par useZones) -->
    <script>
      const j = (u) =>
        fetch(u).then((r) => {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        });
      window.__zonesPromise = j('/data/zones.geojson');
      window.__streetsPromise = j('/data/streets.json');
    </script>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>FreePark BAB — stationnement gratuit à Biarritz, Anglet, Bayonne</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
