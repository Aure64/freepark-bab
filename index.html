<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1"
    />
    <meta
      name="description"
      content="Le stationnement gratuit à Biarritz, Anglet et Bayonne, selon l'heure où vous y allez."
    />
    <meta name="theme-color" content="#faf9f5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="FreePark BAB" />
    <!-- Préconnexions : la carte et le géocodage démarrent sans attendre le JS -->
    <link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin />
    <link rel="dns-prefetch" href="https://api-adresse.data.gouv.fr" />
    <!-- Les zones partent en téléchargement dès le HTML (consommé par useZones) -->
    <script>
      window.__zonesPromise = fetch('/data/zones.geojson').then((r) => {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
      });
    </script>
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>FreePark BAB — stationnement gratuit à Biarritz, Anglet, Bayonne</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
