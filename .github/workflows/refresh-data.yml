# Rafraîchit les données open data chaque mois et pousse le résultat.
# Le push sur main déclenche automatiquement le déploiement Vercel.
name: Rafraîchir les données

on:
  schedule:
    - cron: '17 4 1 * *' # le 1er de chaque mois à 4h17 UTC
  workflow_dispatch: {} # lançable à la main depuis l'onglet Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Générer zones.geojson depuis les open data
        run: node scripts/build-data.mjs

      - name: Committer si les données ont changé
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data data/raw
          if git diff --cached --quiet; then
            echo "Données inchangées, rien à faire."
          else
            git commit -m "data: rafraîchissement mensuel des open data"
            git push
          fi
